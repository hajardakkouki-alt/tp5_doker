name: CI/CD FLASK DOCKER

on:
  push:
    branches: 
      - main

jobs:
  ci:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

  cd:
    name: Docker build and deploy
    runs-on: [self-hosted, windows]  # ← Utilise votre runner Windows
    needs: ci

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build -t hajardk/flask_devops_demo:latest .
          docker push hajardk/flask_devops_demo:latest

      - name: Deploy (direct execution)
        shell: pwsh
        run: |
          # Exécution directe - plus besoin de SSH !
          C:\Users\HP\Desktop\tpcdssh_\deploy.ps1 -DockerUser "${{ secrets.DOCKERHUB_USERNAME }}" -DockerToken "${{ secrets.DOCKERHUB_TOKEN }}"